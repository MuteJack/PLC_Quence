<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC Simulator</title>
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
    <!-- 상단 옵션바 -->
    <header id="toolbar">
        <span class="toolbar-title">PLC Simulator</span>
    </header>

    <!-- 메인 영역 (3열) -->
    <div id="main">
        <!-- 왼쪽: Components -->
        <aside id="panel-components">
            <div class="panel-header">Components</div>
            <div class="panel-body">
                <div class="comp-group">
                    <div class="comp-group-title">Line</div>
                    <div class="comp-item" data-type="Line"><img src="images/Components/Line_Normal.svg"><span>Horizontal</span></div>
                    <div class="comp-item" data-type="Vertical"><img src="images/Components/Line_Vertical_Down_Normal.svg"><span>Vertical</span></div>
                </div>
                <div class="comp-group">
                    <div class="comp-group-title">Input</div>
                    <div class="comp-item" data-type="PB_A"><img src="images/Components/PB_A_Normal.svg"><span>PB_A</span></div>
                    <div class="comp-item" data-type="PB_B"><img src="images/Components/PB_B_Normal.svg"><span>PB_B</span></div>
                </div>
                <div class="comp-group">
                    <div class="comp-group-title">Contact</div>
                    <div class="comp-item" data-type="Contact_Memory_A"><img src="images/Components/Contact_Memory_A_Normal.svg"><span>Memory_A</span></div>
                    <div class="comp-item" data-type="Contact_Memory_B"><img src="images/Components/Contact_Memory_B_Normal.svg"><span>Memory_B</span></div>
                    <div class="comp-item" data-type="Contact_Y_A"><img src="images/Components/Contact_Y_A_Normal.svg"><span>Output_A</span></div>
                    <div class="comp-item" data-type="Contact_Y_B"><img src="images/Components/Contact_Y_B_Normal.svg"><span>Output_B</span></div>
                    <div class="comp-item" data-type="Contact_Timer_A"><img src="images/Components/Contact_Timer_A_Normal.svg"><span>Timer_A</span></div>
                    <div class="comp-item" data-type="Contact_Timer_B"><img src="images/Components/Contact_Timer_B_Normal.svg"><span>Timer_B</span></div>
                </div>
                <div class="comp-group">
                    <div class="comp-group-title">Output</div>
                    <div class="comp-item" data-type="Output_Y"><img src="images/Components/Output_Y_Normal.svg"><span>Y</span></div>
                    <div class="comp-item" data-type="Function_Memory"><img src="images/Components/Function_Memory_Normal.svg"><span>Memory</span></div>
                    <div class="comp-item" data-type="Output_Timer"><img src="images/Components/Output_Timer_Normal.svg"><span>Timer</span></div>
                </div>
            </div>
        </aside>

        <!-- 가운데: 래더 에디터 -->
        <main id="workspace">
            <div class="panel-header">Ladder Editor</div>
            <div id="ladder-scroll">
                <table id="ladder-table">
                    <colgroup>
                        <col style="width:150px">
                        <col style="width:20px">
                        <col style="width:100px"><col style="width:100px"><col style="width:100px"><col style="width:100px"><col style="width:100px"><col style="width:100px"><col style="width:100px"><col style="width:100px"><col style="width:100px"><col style="width:100px"><col style="width:100px"><col style="width:100px">
                        <col style="width:40px">
                    </colgroup>
                    <thead>
                        <tr>
                            <th colspan="2">Load</th>
                            <th colspan="12">Ladder</th>
                            <th class="col-com">COM</th>
                        </tr>
                        <tr>
                            <th class="col-comment">Comment</th>
                            <th class="col-linenum">#</th>
                            <th>0</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>11</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="rung-row"><td></td><td>0</td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td><div class="step-cell"><div class="step-name"></div><div class="step-symbol"><div class="step-symbol-back"></div><div class="step-symbol-fore"><div class="step-symbol-left"></div><div class="step-symbol-center"></div><div class="step-symbol-right"></div></div></div><div class="step-comment"></div></div></td><td></td></tr>
                        <tr class="rung-row rung-add"><td><button class="btn-add-rung">+ Add Rung</button></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                    </tbody>
                </table>
            </div>
        </main>

        <!-- 오른쪽: Variable Monitor -->
        <aside id="panel-monitor">
            <div class="panel-header">Variable Monitor</div>
            <div class="panel-body">
                <table id="var-table">
                    <thead>
                        <tr>
                            <th>Variable</th>
                            <th>Type</th>
                            <th>Description</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody id="var-tbody"></tbody>
                </table>
            </div>
        </aside>
    </div>
    <script src="js/ladder.js"></script>
</body>
</html>
